<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Reporting Dashboard</title>
    
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUarbnLmqwVkMvQconfGvN6MtkwRsbgv8onlcop3RYJlJg6FeD" crossorigin="anonymous">
    
    <!-- Radzen Blazor CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/radzen-blazor@4.18.1/css/material-base.css">
    
    <!-- Custom Dashboard CSS -->
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <svg class="spinner" viewBox="0 0 50 50">
            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
        </svg>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor Server JS -->
    <script src="_framework/blazor.server.js"></script>
    
    <!-- Bootstrap 5.3.0 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWbSxccPQtf3RoUfAUQAZLJOiYysDQRZ7i7gAH2Cl9iVXedc16" crossorigin="anonymous"></script>
    
    <!-- Radzen Blazor JS -->
    <script src="https://cdn.jsdelivr.net/npm/radzen-blazor@4.18.1/Radzen.Blazor.js"></script>
</body>
</html>
