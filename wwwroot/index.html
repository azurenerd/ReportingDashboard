<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="Executive Project Reporting Dashboard" />
    <meta name="theme-color" content="#ffffff" />
    
    <title>Executive Dashboard</title>
    
    <!-- Blazor Server base href for routing -->
    <base href="/" />
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUarznKPiZpXsSXrAwmolia2vjtBZ734p9NiPZc0A6Tn2UkyM" crossorigin="anonymous" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Dashboard Stylesheets -->
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/print.css" media="print" />
</head>
<body>
    <div id="app">
        <div class="app-loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading Executive Dashboard...</p>
        </div>
    </div>

    <!-- Blazor Server Runtime -->
    <script src="_framework/blazor.server.js"></script>
    
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWbSxccPQtF3EpF3fnJHog6LaEVF6/BT4J9uj4/46XrCat8" crossorigin="anonymous"></script>
    
    <!-- Chart.js with Fallback -->
    <script>
        window.addEventListener('error', function(event) {
            if (event.filename && event.filename.includes('chart')) {
                console.warn('Chart.js CDN unavailable - dashboard will render without timeline visualization');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" integrity="sha384-xkVYCJ2sW5Y2L9ZvIU+jrH9sJr3mLNXE/wqEjd3m/jgmz/G3R/Zn2IfVXdJ3cRRA" crossorigin="anonymous"></script>
    
    <!-- Dashboard Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/charts.js"></script>
    
    <!-- Global Error Handler -->
    <script>
        window.addEventListener('error', function(event) {
            console.error('Application Error:', event.error);
        });
    </script>
    
    <noscript>
        <div class="alert alert-warning m-5">
            <h4>JavaScript Required</h4>
            <p>This dashboard requires JavaScript to be enabled in your browser.</p>
        </div>
    </noscript>
</body>
</html>
