<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Project Dashboard</title>
    
    <!-- Pico CSS Framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    
    <!-- Custom Dashboard Styles -->
    <link rel="stylesheet" href="css/dashboard.css" />
    
    <!-- Blazor Framework -->
    <base href="/" />
    <link href="_framework/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="AgentSquad.Runner.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <svg class="oi oi-reload" viewBox="0 0 256 256" style="
            animation: spin 2s linear infinite;
            display: inline-block;
            width: 40px;
            height: 40px;
            margin: 50px;
            color: #0066cc;">
            <circle cx="128" cy="128" r="100" fill="none" stroke="currentColor" stroke-width="16"></circle>
        </svg>
        <p>Loading...</p>
    </div>

    <div id="blazor-error-ui">
        <environment include="Staging,Production">
            An error has occurred. This application may no longer respond until reloaded.
        </environment>
        <environment include="Development">
            An unhandled exception has occurred. See browser dev tools for details.
        </environment>
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.server.js"></script>
</body>
</html>
