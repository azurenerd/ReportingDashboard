<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="Executive Project Reporting Dashboard" />
    <meta name="theme-color" content="#ffffff" />
    
    <title>Executive Dashboard</title>
    
    <!-- Blazor Server base href for routing -->
    <base href="/" />
    
    <!-- Bootstrap 5 CSS with CDN fallback -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUarznKPiZpXsSXrAwmolia2vjtBZ734p9NiPZc0A6Tn2UkyM" crossorigin="anonymous" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Dashboard Stylesheets -->
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="css/print.css" media="print" />
    
    <!-- CDN Fallback Styles -->
    <style>
        .cdn-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #fff3cd;
            color: #664d03;
            padding: 12px 20px;
            font-size: 14px;
            z-index: 9999;
            border-bottom: 1px solid #ffecb5;
        }
        .cdn-warning.show { display: block; }
    </style>
</head>
<body>
    <div class="cdn-warning" id="cdnWarning">
        ⚠️ Some resources (Bootstrap, Chart.js) failed to load from CDN. Dashboard will render in basic mode without full styling or charts.
    </div>

    <div id="app">
        <div class="app-loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading Executive Dashboard...</p>
        </div>
    </div>

    <!-- Blazor Server Runtime -->
    <script src="_framework/blazor.server.js"></script>
    
    <!-- Bootstrap Bundle JS with CDN error handling -->
    <script>
        window.bootstrapLoaded = false;
        window.chartJsLoaded = false;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWbSxccPQtF3EpF3fnJHog6LaEVF6/BT4J9uj4/46XrCat8" crossorigin="anonymous" onload="window.bootstrapLoaded=true" onerror="window.showCdnWarning()"></script>
    
    <!-- Chart.js with CDN fallback -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" integrity="sha384-xkVYCJ2sW5Y2L9ZvIU+jrH9sJr3mLNXE/wqEjd3m/jgmz/G3R/Zn2IfVXdJ3cRRA" crossorigin="anonymous" onload="window.chartJsLoaded=true" onerror="window.showCdnWarning()"></script>
    
    <!-- Dashboard Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/charts.js"></script>
    
    <!-- CDN Fallback Handler -->
    <script>
        window.showCdnWarning = function() {
            console.warn('CDN resources failed to load - dashboard running in degraded mode');
            document.getElementById('cdnWarning').classList.add('show');
        };
        
        window.addEventListener('error', function(event) {
            if (event.filename && (event.filename.includes('bootstrap') || event.filename.includes('chart'))) {
                window.showCdnWarning();
            }
        });
    </script>
    
    <!-- Global Error Handler -->
    <script>
        window.addEventListener('error', function(event) {
            console.error('Application Error:', event.error);
        });
    </script>
    
    <noscript>
        <div class="alert alert-warning m-5">
            <h4>JavaScript Required</h4>
            <p>This dashboard requires JavaScript to be enabled in your browser.</p>
        </div>
    </noscript>
</body>
</html>
