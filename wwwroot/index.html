<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="Executive Project Reporting Dashboard" />
    <meta name="theme-color" content="#ffffff" />
    
    <title>Executive Dashboard</title>
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/site.css" />
    
    <!-- Bootstrap 5 CDN for responsive utilities -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <!-- System Fonts & Font Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    
    <!-- Print Styles -->
    <style media="print">
        @page {
            size: A4;
            margin: 1cm;
        }
    </style>
</head>
<body>
    <!-- Blazor App Component -->
    <div id="app">
        <div class="loading-container">
            <div class="spinner"></div>
            <p>Loading dashboard...</p>
        </div>
    </div>

    <!-- Blazor Script -->
    <script src="_framework/blazor.server.js"></script>
    
    <!-- Utilities -->
    <script src="js/utils.js"></script>
    
    <!-- Dashboard Scripts -->
    <script src="js/dashboard.js"></script>
    
    <!-- Chart.js for Timeline Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/charts.js"></script>
    
    <!-- Bootstrap Bundle JS (for responsive utilities) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Global Error Handler -->
    <script>
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
            document.getElementById('app').innerHTML = '<div class="error-container"><p>An error occurred. Please refresh the page.</p></div>';
        });
    </script>
    
    <noscript>
        <div class="error-container">
            <h1>JavaScript Required</h1>
            <p>This dashboard requires JavaScript to be enabled.</p>
        </div>
    </noscript>
</body>
</html>
