<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Executive Project Dashboard</title>
    
    <!-- Pico CSS Framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/picocss@2.0.6/css/pico.min.css">
    
    <!-- Custom Dashboard Styles -->
    <link rel="stylesheet" href="/css/dashboard.css">
    
    <!-- Base Styles -->
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        body {
            display: flex;
            flex-direction: column;
        }
        
        app {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-spinner">
            <p>Loading dashboard...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        <environment include="Staging,Production">
            <p>An error has occurred. This application may no longer respond until reloaded.</p>
        </environment>
        <environment include="Development">
            <p>An unhandled exception has occurred. See browser console for details.</p>
        </environment>
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor Server Bootstrap -->
    <script src="_framework/blazor.server.js"></script>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    
    <!-- Chart.js Fallback & Error Handler -->
    <script>
        if (typeof Chart === 'undefined') {
            console.warn('Chart.js failed to load from CDN. Charts may not render correctly.');
        }
        
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
        });
    </script>
    
    <!-- Custom JavaScript -->
    <script src="/js/error-handler.js"></script>
    <script src="/js/timeline.js"></script>
</body>
</html>
