<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding & Responsive Viewport -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Meta Tags -->
    <meta name="description" content="Executive Project Reporting Dashboard - Real-time project status, milestones, and work item tracking." />
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light" />
    
    <title>Executive Project Dashboard</title>
    
    <!-- System Font Stack - Ensure consistent cross-browser rendering -->
    <style>
        :root {
            --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            --font-family-mono: 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', monospace;
        }
        
        html {
            font-family: var(--font-family-base);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
    
    <!-- Bootstrap 5 CSS CDN -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-9ndCyUaIbzAi2FUarznKPiZpXsSXrAwmolia2vjtBZ734p9NiPZc0A6Tn2UkyM" 
        crossorigin="anonymous" />
    
    <!-- Google Fonts - Inter Font Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link 
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" 
        rel="stylesheet" />
    
    <!-- Dashboard Base Stylesheet -->
    <link rel="stylesheet" href="css/site.css" />
    
    <!-- Print Stylesheet -->
    <link rel="stylesheet" href="css/print.css" media="print" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>
    <!-- Blazor App Root Container -->
    <div id="app">
        <div class="app-loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading Executive Dashboard...</p>
        </div>
    </div>

    <!-- Blazor Server Runtime -->
    <script src="_framework/blazor.server.js"></script>
    
    <!-- Bootstrap 5 Bundle JS (includes Popper) -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-geWF76RCwLtnZ8qwWbSxccPQtF3EpF3fnJHog6LaEVF6/BT4J9uj4/46XrCat8" 
        crossorigin="anonymous"></script>
    
    <!-- Chart.js Library for Timeline & Metrics Visualization -->
    <script 
        src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" 
        integrity="sha384-xkVYCJ2sW5Y2L9ZvIU+jrH9sJr3mLNXE/wqEjd3m/jgmz/G3R/Zn2IfVXdJ3cRRA" 
        crossorigin="anonymous"></script>
    
    <!-- Dashboard Utilities -->
    <script src="js/utils.js"></script>
    
    <!-- Charts & Visualization Script -->
    <script src="js/charts.js"></script>
    
    <!-- Dashboard Application Logic -->
    <script src="js/dashboard.js"></script>
    
    <!-- Global Error Handling -->
    <script>
        window.addEventListener('error', function(event) {
            console.error('Application Error:', event.error);
            const appDiv = document.getElementById('app');
            if (appDiv) {
                const errorContent = '<div class="alert alert-danger m-5"><h4>Error Loading Dashboard</h4><p>' + 
                    (event.error?.message || 'An unexpected error occurred. Please refresh the page.') + 
                    '</p></div>';
                appDiv.innerHTML = errorContent;
            }
        });
    </script>
    
    <!-- NoScript Fallback for Disabled JavaScript -->
    <noscript>
        <div class="alert alert-warning m-5">
            <h4>JavaScript Required</h4>
            <p>This Executive Dashboard requires JavaScript to be enabled in your browser to function properly.</p>
        </div>
    </noscript>
</body>
</html>
