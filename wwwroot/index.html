<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#27AE60">
    <meta name="description" content="Executive Project Reporting Dashboard">
    <title>Executive Project Dashboard</title>
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/print.css">
    
    <!-- Preload Critical Resources -->
    <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js">
    <link rel="preload" as="script" href="_framework/blazor.server.js">
</head>
<body>
    <div id="app" class="app-root">
        <div class="loading-spinner">
            <p>Loading dashboard...</p>
        </div>
    </div>

    <!-- Chart.js Library (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

    <!-- Dashboard Initialization Scripts -->
    <script src="js/dashboard.js"></script>
    <script src="js/print-handler.js"></script>

    <!-- Blazor Bootstrap -->
    <script src="_framework/blazor.server.js"></script>

    <!-- Error Handling -->
    <script>
        window.addEventListener('error', function(event) {
            console.error('Global error caught:', event.error);
        });
        
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled promise rejection:', event.reason);
        });
    </script>
</body>
</html>
